<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>死心塌地 · SBTI 测试结果</title>
  <style>
    :root {
      --bg: #f4faf4;
      --panel: #ffffff;
      --text: #1a2e1f;
      --muted: #5c6b5f;
      --line: #d4ead9;
      --soft: #e8f5eb;
      --accent: #2d8f4a;
      --accent-strong: #1e6b36;
      --shadow: 0 16px 40px rgba(47, 73, 55, 0.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, #f8fff8 0, #f6faf6 36%, #f2f7f3 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }
    button:hover { transform: translateY(-1px); }
    a.btn-primary,
    a.btn-secondary {
      text-decoration: none;
    }
    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(77, 106, 83, 0.18);
      font-weight: 700;
    }
    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-weight: 700;
    }
    .result-wrap {
      margin-top: 22px;
      padding: 22px;
    }
    .result-layout {
      display: grid;
      gap: 18px;
    }
    .result-top {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
    }
    .poster-box, .type-box, .analysis-box, .dim-box, .note-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }
    .poster-box {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 280px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(127,165,134,0.16), rgba(127,165,134,0) 40%),
        linear-gradient(180deg, #ffffff, #f7fbf8);
    }
    .poster-box::after {
      content: "";
      position: absolute;
      right: -46px;
      bottom: -46px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(127,165,134,0.12), rgba(127,165,134,0.01));
      pointer-events: none;
    }
    .poster-image {
      width: 100%;
      min-height: 220px;
      max-height: 460px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.75);
      position: relative;
      z-index: 1;
    }
    .poster-box.no-image .poster-image {
      display: none;
    }
    .poster-caption {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      position: relative;
      z-index: 1;
    }
    .type-kicker {
      font-size: 12px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .06em;
    }
    .type-name {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }
    .type-subname {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
      line-height: 1.4;
    }
    .analysis-box h3, .dim-box h3, .note-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }
    .analysis-box p {
      margin: 0;
      color: #304034;
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-wrap;
    }
    .dim-list {
      display: grid;
      gap: 12px;
    }
    .dim-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }
    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .dim-item-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .dim-item-score {
      color: var(--accent-strong);
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
    }
    .dim-item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .note-box p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .author-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
      overflow: hidden;
    }
    .author-box summary {
      list-style: none;
      cursor: pointer;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .author-box summary::-webkit-details-marker { display: none; }
    .author-box summary::after {
      content: '展开';
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      padding: 6px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .author-box[open] summary::after {
      content: '收起';
    }
    .author-content {
      border-top: 1px solid var(--line);
      padding: 0 18px 18px;
    }
    .author-content p {
      margin: 14px 0 0;
      color: #304034;
      font-size: 14px;
      line-height: 1.9;
    }
    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    @media (max-width: 860px) {
      .result-top { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .result-wrap { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="resultMain" class="result-wrap card">
      <div class="result-layout">
        <div class="result-top">
          <div class="poster-box" id="posterBox">
            <img id="posterImage" class="poster-image" alt="死心塌地 DEAD SET 人格结果图" src="./image/设计死心塌地风格图_看图王.png" />
            <div id="posterCaption" class="poster-caption"></div>
          </div>
          <div class="type-box">
            <div class="type-kicker" id="resultModeKicker"></div>
            <div class="type-name" id="resultTypeName"></div>
            <div class="match" id="matchBadge"></div>
            <div class="type-subname" id="resultTypeSub"></div>
          </div>
        </div>
        <div class="analysis-box">
          <h3>死心塌地 · 人格速写</h3>
          <p id="resultDesc"></p>
        </div>
        <div class="dim-box">
          <h3 id="dimBoxHeading">十五维画像</h3>
          <div id="dimList" class="dim-list"></div>
        </div>
        <div class="note-box">
          <h3>给死心塌地型选手的一句提醒</h3>
          <p id="funNote"></p>
        </div>
        <details class="author-box">
          <summary>作者的话</summary>
          <div class="author-content">
            <p>本测试首发于b站up主蛆肉儿串儿（UID417038183），初衷是劝诫一位爱喝酒的朋友戒酒。</p>
            <p>由于作者的人格是SHIT愤世者，所以平等的攻击了各位，在此抱歉！！不过我是一个绝世大美女，你们一定会原谅我，有B站的朋友们也可以关注我。</p>
            <p>关于这个测试，我没法很好的平衡娱乐和专业性，因此对于一些人格的阐释较为模糊或完全不准（如屌丝可能并非真的屌丝），如有冒犯非常抱歉！！</p>
            <p>再鉴于时间精力有限，就随便搞了一个先这样玩玩，后续会慢慢完善修改的，总之好玩为主，还请不要用于盈利呀。</p>
          </div>
        </details>
      </div>
      <div class="result-actions">
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
          <a href="index.html" class="btn-secondary" style="display:inline-block;">前往测试页</a>
          <a href="index.html" class="btn-primary" style="display:inline-block;">回到首页</a>
        </div>
      </div>
    </section>
  </div>

  <script>
    const DEAD_SET_POSTER = './image/设计死心塌地风格图_看图王.png';

    /** 结果页统一为「死心塌地 / DEAD SET」主题；十五维度仍取自本次测试数据 */
    const DEAD_SET_THEME = {
      resultModeKicker: '你的人格类型是',
      resultTypeName: '死心塌地 · DEAD SET',
      matchBadge: '认定就不轻易掉头 · 专注就是生活态度',
      resultTypeSub: '你不是「听不进劝」，你只是把钱、时间和心软都押在极少数重要的人事上；一旦选定，宁愿多扛一段路，也不愿换来换去。',
      posterCaption: '配图为你的结果卡风格示意：笃定、自成一派，像对自己竖大拇指那样相信当下的选择。',
      resultDesc: '「死心塌地」在这里不是贬义的顽固，而是一种高密度投入：情感里讲义气与长线，做事时认目标、认伙伴、认自己答应过的话。你讨厌轻飘飘的承诺，也懒得经营一堆泛泛之交；宁可人少一点、事精一点，把力气砸进真正在乎的那几块版图里。\n\n代价是偶尔会累——因为你不擅长「随时可以换赛道」的轻松感，会把别人的摇摆看成噪声。好消息是，这种特质在需要坚持、需要兜底、需要有人站住的场合，往往是沉默但极稳的支柱。若还能给心里留一点点「复盘窗口」，让死心塌地变成清醒的选择而不是惯性，你就既锋利又温柔。',
      funNote: '本页主文案围绕「死心塌地」主题凝练，仅供娱乐与交流。把执着用在值得的人事上，这份死心塌地也可以是一座灯塔，而不是一副枷锁。',
      funNoteDemo: '本页是独立的「死心塌地」主题展示；下方十五维为预览说明。完整测试与题库人格结果请使用站内其他页面。内容仅供娱乐，请勿当成专业评测依据。'
    };

    const DIM_ROWS_PLACEHOLDER = [
      {
        name: '十五维细节',
        scoreLabel: '尚未作答',
        explanation: '本页不串联题库测试流程，此处为十五维区域的占位说明。如需分维度得分与解读，请打开测试主站完成作答后查看内嵌结果。'
      }
    ];

    function renderFromPayload(data) {
      const merged = { ...data, ...DEAD_SET_THEME };
      const dimRows = (data.dimRows && data.dimRows.length) ? data.dimRows : DIM_ROWS_PLACEHOLDER;
      const hasRealDims = !!(data.dimRows && data.dimRows.length);

      document.getElementById('resultModeKicker').textContent = merged.resultModeKicker || '';
      document.getElementById('resultTypeName').textContent = merged.resultTypeName || '';
      document.getElementById('matchBadge').textContent = merged.matchBadge || '';
      document.getElementById('resultTypeSub').textContent = merged.resultTypeSub || '';
      document.getElementById('resultDesc').textContent = merged.resultDesc || '';
      document.getElementById('posterCaption').textContent = merged.posterCaption || '';
      document.getElementById('funNote').textContent = hasRealDims ? (merged.funNote || '') : (merged.funNoteDemo || merged.funNote || '');

      document.getElementById('dimBoxHeading').textContent = hasRealDims
        ? '十五维画像（本次作答）'
        : '十五维画像（未作答预览）';

      const posterBox = document.getElementById('posterBox');
      const posterImage = document.getElementById('posterImage');
      posterImage.src = DEAD_SET_POSTER;
      posterImage.alt = '死心塌地 DEAD SET 人格结果图';
      posterBox.classList.remove('no-image');

      const dimList = document.getElementById('dimList');
      dimList.innerHTML = dimRows.map(row => `
        <div class="dim-item">
          <div class="dim-item-top">
            <div class="dim-item-name">${row.name}</div>
            <div class="dim-item-score">${row.scoreLabel}</div>
          </div>
          <p>${row.explanation}</p>
        </div>
      `).join('');

      document.title = '死心塌地 · DEAD SET · SBTI';
    }

    renderFromPayload({ dimRows: [] });
  </script>
</body>
</html>
